<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nguyễn Tiêu AI - Người Bạn Thông Minh</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #f0f2f5;
            color: #1c1e21;
        }
        .glass-header {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }
        .chat-window {
            height: calc(100vh - 140px);
        }
        .bubble-ai {
            background-color: #ffffff;
            border-radius: 18px 18px 18px 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .bubble-user {
            background: linear-gradient(135deg, #0084ff 0%, #0072ff 100%);
            color: white;
            border-radius: 18px 18px 4px 18px;
        }
        .typing-dot {
            width: 6px;
            height: 6px;
            background: #90949c;
            border-radius: 50%;
            animation: blink 1.4s infinite both;
        }
        @keyframes blink {
            0%, 80%, 100% { opacity: 0.2; }
            40% { opacity: 1; }
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #ced0d4; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <header class="glass-header fixed top-0 w-full z-50 px-6 py-3 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-blue-500 flex items-center justify-center shadow-md">
                <i class="fas fa-smile text-white text-xl"></i>
            </div>
            <div>
                <h1 class="text-lg font-bold text-blue-600">Nguyễn Tiêu AI</h1>
                <div class="flex items-center gap-1.5">
                    <span class="w-2 h-2 bg-green-500 rounded-full"></span>
                    <span class="text-[11px] text-gray-500 font-medium">Đang sẵn sàng trợ giúp</span>
                </div>
            </div>
        </div>
        <button onclick="clearChat()" class="text-gray-400 hover:text-red-500 transition">
            <i class="fas fa-trash-alt"></i>
        </button>
    </header>

    <main id="chat-content" class="chat-window mt-16 px-4 py-6 overflow-y-auto flex flex-col gap-4 max-w-2xl mx-auto w-full">
        <div class="flex justify-start">
            <div class="bubble-ai px-4 py-3 text-sm leading-relaxed max-w-[85%]">
                Chào bạn! Mình là Nguyễn Tiêu AI. Mình rất vui được gặp bạn. Hôm nay bạn cần mình hỗ trợ điều gì không?
            </div>
        </div>
    </main>

    <div class="fixed bottom-0 w-full bg-white border-t p-4">
        <div class="max-w-2xl mx-auto flex items-center gap-2">
            <div id="loading" class="hidden absolute -top-10 left-4 flex gap-1 bg-white px-3 py-2 rounded-full shadow-md border border-gray-100">
                <div class="typing-dot"></div>
                <div class="typing-dot" style="animation-delay: 0.2s"></div>
                <div class="typing-dot" style="animation-delay: 0.4s"></div>
            </div>
            
            <input type="text" id="user-input" class="flex-grow bg-gray-100 border-none focus:ring-2 focus:ring-blue-500 rounded-full px-5 py-3 text-sm outline-none" placeholder="Nhập tin nhắn của bạn...">
            <button onclick="sendMsg()" id="send-btn" class="w-11 h-11 rounded-full bg-blue-500 flex items-center justify-center text-white hover:bg-blue-600 transition shadow-lg">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <script>
        const apiKey = ""; 
        const chatBox = document.getElementById('chat-content');
        const input = document.getElementById('user-input');
        const loader = document.getElementById('loading');

        function clearChat() {
            chatBox.innerHTML = '';
            addMsg("Đã xóa lịch sử trò chuyện. Mình có thể giúp gì mới cho bạn không?", 'ai');
        }

        async function sendMsg() {
            const text = input.value.trim();
            if (!text) return;

            input.value = '';
            addMsg(text, 'user');
            loader.classList.remove('hidden');

            try {
                const isImg = /vẽ|tạo ảnh|hình ảnh/i.test(text);
                if (isImg) {
                    await fetchImage(text);
                } else {
                    await fetchText(text);
                }
            } catch (e) {
                addMsg("Rất tiếc, mình gặp chút sự cố kết nối. Bạn vui lòng thử lại nhé!", 'ai');
            } finally {
                loader.classList.add('hidden');
            }
        }

        function addMsg(content, role, isImg = false) {
            const div = document.createElement('div');
            div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} animate-fade-in`;
            
            if (isImg) {
                div.innerHTML = `<div class="bubble-ai p-2 max-w-[85%] shadow-md"><img src="${content}" class="rounded-lg w-full h-auto"></div>`;
            } else {
                div.innerHTML = `<div class="bubble-${role} px-4 py-3 text-sm max-w-[85%] shadow-sm">${content.replace(/\n/g, '<br>')}</div>`;
            }
            
            chatBox.appendChild(div);
            chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });
        }

        async function fetchText(prompt) {
            const sys = "Mày là Nguyễn Tiêu AI, một người bạn cực kỳ thân thiện, lễ phép và luôn sẵn lòng giúp đỡ mọi người. Xưng hô là 'mình' và 'bạn'. Luôn trả lời một cách lịch sự, ấm áp và thông minh.";
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    systemInstruction: { parts: [{ text: sys }] },
                    tools: [{ "google_search": {} }]
                })
            });
            const data = await res.json();
            addMsg(data.candidates[0].content.parts[0].text, 'ai');
        }

        async function fetchImage(prompt) {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ instances: { prompt: prompt }, parameters: { sampleCount: 1 } })
            });
            const data = await res.json();
            if (data.predictions) {
                addMsg(`data:image/png;base64,${data.predictions[0].bytesBase64Encoded}`, 'ai', true);
            } else {
                addMsg("Mình không thể tạo hình ảnh này, bạn thử mô tả khác xem sao nhé!", 'ai');
            }
        }

        input.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMsg(); });
    </script>
</body>
</html>
